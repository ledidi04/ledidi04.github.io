        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* VARIABLES LIGHT MODE (par défaut : blanc) */
        :root {
            --bg-body: #ffffff;
            --bg-surface: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #475569;
            --border-light: #e2e8f0;
            --border-card: #e2edf5;
            --primary: #0f3b2c;
            --primary-light: #1e5a3a;
            --primary-glow: rgba(15, 59, 44, 0.08);
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 20px 25px -12px rgba(0, 0, 0, 0.08);
            --accent-cyan: #0891b2;
            --transition: all 0.2s ease;
        }

        body.dark {
            --bg-body: #0a0c12;
            --bg-surface: #11161f;
            --bg-card: #1a212b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-light: #2d3748;
            --border-card: #2a3346;
            --primary: #4ade80;
            --primary-light: #22c55e;
            --primary-glow: rgba(74, 222, 128, 0.15);
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 20px 25px -12px rgba(0, 0, 0, 0.6);
            --accent-cyan: #22d3ee;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            scroll-behavior: smooth;
            transition: background-color 0.3s, color 0.2s;
        }

        code, .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            background: var(--bg-body);
            backdrop-filter: blur(12px);
            background-color: rgba(var(--bg-body-rgb, 255,255,255), 0.9);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
            gap: 1rem;
        }
        body.dark .navbar {
            background: rgba(10, 12, 18, 0.95);
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.95rem;
            border-bottom: 2px solid transparent;
            padding-bottom: 4px;
        }
        .nav-links a:hover {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* controls group (lang + theme) */
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .lang-btn, .theme-toggle {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            padding: 0.45rem 1rem;
            border-radius: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.2s;
        }
        .lang-btn.active, .theme-toggle:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .theme-toggle i {
            margin-right: 6px;
        }

        /* SECTIONS */
        section {
            max-width: 1280px;
            margin: 0 auto;
            padding: 5rem 2rem;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            border-left: 5px solid var(--primary);
            padding-left: 1.2rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        /* HERO */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 3rem;
            flex-wrap: wrap;
        }
        .hero-content {
            flex: 1;
        }
        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .hero-tagline {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hero-description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            background: var(--bg-surface);
            padding: 1.2rem 1.8rem;
            border-radius: 24px;
            border-left: 4px solid var(--primary);
            margin-bottom: 1.8rem;
        }
        .hero-badges {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .hero-badges span {
            color: var(--text-secondary);
        }
        .cv-button {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--primary);
            padding: 0.75rem 2rem;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .cv-button:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .hero-avatar .avatar-square {
            width: 280px;
            height: 280px;
            background: var(--bg-surface);
            border-radius: 32px;
            overflow: hidden;
            border: 3px solid var(--primary);
            box-shadow: var(--shadow-md);
        }
        .avatar-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.2);
            object-position: center 20%;
        }

        /* SQUARE CARDS GRID (services) */
        .square-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        .square-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 28px;
            padding: 2rem 1.5rem;
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            aspect-ratio: 1 / 0.9;
        }
        .square-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }
        .card-number {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            opacity: 0.7;
            margin-bottom: 1rem;
        }
        .square-card h3 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
        }
        .square-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.5rem;
            flex-grow: 1;
        }

        /* SKILLS & EXPERIENCE SECTION (mix) */
        .skills-experience {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-top: 1rem;
        }
        .skills-box, .exp-box {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 32px;
            padding: 2rem;
        }
        .skills-box h3, .exp-box h3 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }
        .skill-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .skill-tag {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        .experience-item {
            margin-bottom: 1.8rem;
            border-left: 3px solid var(--primary);
            padding-left: 1.2rem;
        }
        .exp-date {
            font-size: 0.8rem;
            color: var(--accent-cyan);
            font-family: monospace;
        }
        .exp-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0.3rem 0;
        }
        .exp-company {
            color: var(--text-muted);
        }

        /* PORTFOLIO */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .portfolio-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 28px;
            padding: 1.8rem;
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .portfolio-card i {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .portfolio-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .portfolio-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .port-tag {
            background: var(--bg-surface);
            font-size: 0.7rem;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }

        /* TESTIMONIALS */
        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .testimonial-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 28px;
            padding: 2rem 1.8rem;
            box-shadow: var(--shadow-sm);
        }
        .testimonial-card i.fa-quote-left {
            font-size: 2rem;
            color: var(--primary);
            opacity: 0.5;
            margin-bottom: 1rem;
        }
        .testimonial-text {
            font-style: italic;
            margin-bottom: 1.2rem;
            color: var(--text-secondary);
        }
        .client-name {
            font-weight: 700;
            color: var(--primary);
        }

        /* CONTACT + FORM */
        .contact-section {
            background: var(--bg-surface);
            border-radius: 48px;
            padding: 3rem;
            border: 1px solid var(--border-light);
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2.5rem;
        }
        .contact-info {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 28px;
            border: 1px solid var(--border-card);
        }
        .contact-info i {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .contact-info a {
            color: var(--text-primary);
            text-decoration: none;
            word-break: break-word;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 2rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        input, textarea {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 0.9rem 1.2rem;
            border-radius: 28px;
            font-family: inherit;
            color: var(--text-primary);
            font-size: 0.95rem;
            width: 100%;
        }
        textarea {
            resize: vertical;
        }
        .send-btn {
            background: var(--primary);
            border: none;
            padding: 0.9rem;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            width: 200px;
        }
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 999;
            box-shadow: var(--shadow-md);
        }
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        footer {
            background: var(--bg-surface);
            border-top: 1px solid var(--border-light);
            padding: 3rem 2rem 1.5rem;
            margin-top: 2rem;
        }
        @media (max-width: 800px) {
            .hero { flex-direction: column-reverse; text-align: center; }
            .skills-experience { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; align-items: stretch; }
            .nav-links { justify-content: center; }
            .controls { justify-content: center; }
        }
        @media (max-width: 500px) {
            .hero-avatar .avatar-square { width: 220px; height: 220px; margin: 0 auto; }
            .square-card { aspect-ratio: auto; min-height: 260px; }
        }
    </style>

                                    <div className="card-number">{String(idx).padStart(2,'0')}</div>

                {/* BACK TO TOP BUTTON */}
                <div className={`back-to-top ${showBackToTop ? 'visible' : ''}`} onClick={scrollToTop}><i className="fas fa-arrow-up"></i></div>

</script>
</body>
</html>
